<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0b0d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0b0d" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="480" fill="#0a0b0d"/>
  <rect width="360" height="480" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a1d22" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="96" x2="360" y2="96"/>
    <line x1="0" y1="192" x2="360" y2="192"/>
    <line x1="0" y1="288" x2="360" y2="288"/>
    <line x1="0" y1="384" x2="360" y2="384"/>
    <line x1="72" y1="0" x2="72" y2="480"/>
    <line x1="144" y1="0" x2="144" y2="480"/>
    <line x1="216" y1="0" x2="216" y2="480"/>
    <line x1="288" y1="0" x2="288" y2="480"/>
  </g>

  <!-- Crosshair -->
  <g stroke="#ff6b00" stroke-width="1" opacity="0.35">
    <!-- Horizontal lines -->
    <line x1="100" y1="220" x2="152" y2="220"/>
    <line x1="208" y1="220" x2="260" y2="220"/>
    <!-- Vertical lines -->
    <line x1="180" y1="160" x2="180" y2="200"/>
    <line x1="180" y1="240" x2="180" y2="280"/>
    <!-- Center dot -->
    <circle cx="180" cy="220" r="2.5" fill="#ff6b00" opacity="0.7"/>
    <!-- Outer circle -->
    <circle cx="180" cy="220" r="38" fill="none" stroke-width="0.8"/>
  </g>

  <!-- Glow behind text -->
  <rect width="360" height="480" fill="url(#center-glow)"/>

  <!-- CS text -->
  <text
    x="180"
    y="195"
    font-family="'Courier New', monospace"
    font-size="96"
    font-weight="900"
    fill="#ff6b00"
    text-anchor="middle"
    letter-spacing="-2"
    filter="url(#blur-sm)"
    opacity="0.4"
  >CS</text>
  <text
    x="180"
    y="195"
    font-family="'Courier New', monospace"
    font-size="96"
    font-weight="900"
    fill="#ff6b00"
    text-anchor="middle"
    letter-spacing="-2"
  >CS</text>

  <!-- 500 text -->
  <text
    x="180"
    y="290"
    font-family="'Courier New', monospace"
    font-size="72"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="4"
    opacity="0.12"
    filter="url(#blur-sm)"
  >500</text>
  <text
    x="180"
    y="290"
    font-family="'Courier New', monospace"
    font-size="72"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="4"
  >500</text>

  <!-- Divider line -->
  <line x1="80" y1="315" x2="280" y2="315" stroke="#ff6b00" stroke-width="0.8" opacity="0.4"/>

  <!-- INDEX label -->
  <text
    x="180"
    y="340"
    font-family="'Courier New', monospace"
    font-size="13"
    font-weight="700"
    fill="#ff6b00"
    text-anchor="middle"
    letter-spacing="6"
    opacity="0.7"
  >INDEX</text>

  <!-- Subtitle -->
  <text
    x="180"
    y="365"
    font-family="'Courier New', monospace"
    font-size="9"
    fill="#4a5568"
    text-anchor="middle"
    letter-spacing="3"
  >500 CS2 SKINS</text>

  <!-- Corner accents -->
  <g stroke="#ff6b00" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 20 20 L 20 40 M 20 20 L 40 20"/>
    <path d="M 340 20 L 340 40 M 340 20 L 320 20"/>
    <path d="M 20 460 L 20 440 M 20 460 L 40 460"/>
    <path d="M 340 460 L 340 440 M 340 460 L 320 460"/>
  </g>
</svg>
