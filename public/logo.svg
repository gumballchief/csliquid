  <text x="2" y="30"
    font-family="'Arial Black','Haettenschweiler','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="30" font-weight="900" letter-spacing="-1"
    fill="#00AAFF">CS</text>
  <!-- LIQUID in white -->
  <text x="40" y="30"
    font-family="'Arial Black','Haettenschweiler','Impact','Franklin Gothic Heavy',sans-serif"
    font-size="30" font-weight="900" letter-spacing="-1"
